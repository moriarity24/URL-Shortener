#version : '3.8'

services :
  postgres:
    image : postgres:15-alpine
    container_name : url_postgres
    environment :
      POSTGRES_USER : postgres
      POSTGRES_PASSWORD : postgres
      POSTGRES_DB : urlshortener
    ports :
     - "5432:5432"
    volumes :
      - postgres_data:/var/lib/postgresql/data
    networks :
      - url_network

    #redis Cache

  redis:
    image : redis:7-alpine
    container_name : url_redis
    ports :
      - "6379:6379"
    networks :
      - url_network

  app:
    build: .
    container_name: url_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: urlshortener
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      BASE_URL: http://localhost:8080
    networks:
      - url_network

volumes :
  postgres_data:

networks :
  url_network: 
    driver: bridge